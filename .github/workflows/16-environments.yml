name: 16 Environments
run-name: 16 Environments | env - ${{inputs.target-env}}

on:
      
    workflow_dispatch:
      inputs:
        debug:
          type: boolean
          default: false
        target-env:
            type: environment
            default: staging

jobs:
    echo:
        runs-on: ubuntu-latest
        environment: ${{inputs.target-env}}
        env:
            my-env-value: ${{vars.MY_ENV_VALUE || 'devault value'}}
        steps:
            - name: Echo vars
              run: | 
                echo "Env variable: ${{env.my-env-value}}"

    deploy-staging:
        runs-on: ubuntu-latest
        environment: staging
        env:
            my-env-value: ${{vars.MY_ENV_VALUE || 'devault value'}}
        steps:
            - name: Echo vars
              run: | 
                echo "Env variable: ${{env.my-env-value}}"
            - name: Deploying
              run: | 
                echo "Deploying to staging"
    e2e-tests:
        runs-on: ubuntu-latest
        needs: deploy-staging
        steps:
            - name: E2E Tests
              run: echo "Running E2E tests ......."

    deploy-prod-frontend:
        runs-on: ubuntu-latest
        needs: e2e-tests
        environment: prod
        env:
            my-env-value: ${{vars.MY_ENV_VALUE || 'devault value'}}
        steps:
            - name: Echo vars
              run: | 
                echo "Env variable: ${{env.my-env-value}}"
            - name: Deploying
              run: | 
                echo "Deploying to prod frontend"

    deploy-prod-backend1:
        runs-on: ubuntu-latest
        needs: e2e-tests
        environment: prod
        env:
            my-env-value: ${{vars.MY_ENV_VALUE || 'devault value'}}
        steps:
            - name: Echo vars
              run: | 
                echo "Env variable: ${{env.my-env-value}}"
            - name: Deploying
              run: | 
                echo "Deploying to prod backend1"

    deploy-prod-backend2:
        runs-on: ubuntu-latest
        needs: e2e-tests
        environment: prod
        env:
            my-env-value: ${{vars.MY_ENV_VALUE || 'devault value'}}
        steps:
            - name: Echo vars
              run: | 
                echo "Env variable: ${{env.my-env-value}}"
            - name: Deploying
              run: | 
                echo "Deploying to prod backend2"