name: Cache Node and NPM Dependencies
description: This action allows to cache both Node and NPM dependencies based on packafge-lock.json file.

inputs:
    node-version: 
        description: NodeJS version to use
        default: 20.x
        required: true
    working-dir:
        description: The working directory of the application
        default: .
        required: false
    target-env:
        description: '"dev" or "prod". Controls whenever dev dependencies are installed'
        default: dev
        required: false
outputs:
    installed-deps:
        description: Whether dependencies are installed or not
        value: ${{steps.cache.outputs.cache-hit != 'true'}}
    random-output:
        description: Some value
        value: ${{steps.random-output.outputs.random}}
runs:
    using: composite
    steps:
        -   name: Setup NodeJS version ${{inputs.node-version}}
            uses: actions/setup-node@v4
            with:
                node-version: ${{inputs.node-version}}
        -   name: Cache dependencies
            id: cache
            uses: actions/cache@v3
            with:
                path: ${{inputs.working-dir}}/node_modules
                key:  node-modules-${{inputs.target-env}}-${{hashfiles(format('{0}/{1}', inputs.working-dir, 'package-lock.json' ))}}
        -   name: Install dependencies
            if: steps.cache.outputs.cache-hit != 'true' && inputs.target-env == 'dev'
            run: ${{inputs.target-env == 'dev' && 'npm ci' || 'npm ci --omit=dev'}}
            shell: bash
            working-directory: ${{inputs.working-dir}}
        -   name: Random output
            shell: bash
            id: random-output
            run: echo "random=123" >> "$GITHUB_OUTPUT"